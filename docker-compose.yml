services:
  contestlogger:
    image: debian:bookworm-slim
    command: /app/contestlog-server -addr :8675 -db /data/contestlog.db -downloads-dir /downloads
    volumes:
      - ./app/contestlog-server:/app/contestlog-server:ro
      - ./app/downloads:/downloads:ro
      - ./data:/data
      - /etc/ssl/certs:/etc/ssl/certs:ro
    ports:
      - "127.0.0.1:8675:8675"
    restart: unless-stopped
